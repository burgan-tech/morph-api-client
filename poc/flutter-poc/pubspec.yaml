name: morph_flutter_poc
description: >
  Flutter PoC for morph-api-client — mirrors poc/ts-vue against the same
  Keycloak + mock-api backend. Demonstrates MorphClient init, OAuth login,
  token status, host HTTP calls, and the HTTP trace log.
publish_to: "none"
version: 0.1.0

environment:
  sdk: ">=3.6.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  morph_core:
    path: ../../packages/dart/morph_core
  morph_oauth2:
    path: ../../packages/dart/morph_oauth2
  morph_logger:
    path: ../../packages/dart/morph_logger
  morph_storage:
    path: ../../packages/dart/morph_storage
  morph_core_storage:
    path: ../../../morph-data-store/adapters/dart-morph-core-storage
  morph_data_store:
    path: ../../../morph-data-store/core/dart-morph-data-store
  http: ^1.2.0
  url_launcher: ^6.3.0
  app_links: ^6.4.0
  shared_preferences: ^2.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/poc-config.json
    - assets/poc-simulation.json
